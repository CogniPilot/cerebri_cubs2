source_roots = [
  "../../models/vendor/CMM-v0.0.2",
  "../../models/plant",
]

[rumoca]
version = "1"
task = "simulate"

[model]
file = "Cubs2NativeSimSIL.mo"
name = "Cubs2NativeSimSIL"

[sim]
dt = 0.002
mode = "lockstep"
solver = "rk-like"
t_end = 40.0
output = "artifacts/native-sim-sil/native-sim-rumoca.html"

[lockstep]
send_rate_hz = 240.0
receive_rate_hz = 50.0
max_advance_dt = 0.002

[input]
mode = "auto"

[transport.zenoh]
mode = "client"
endpoint = "udp/127.0.0.1:7447"

[publish]
send = "cubs2/sil/external_odometry_sample"

[subscribe]
receive = "cubs2/sil/pwm_outputs"

[schema]
bfbs = ["artifacts/native-sim-sil/native_sil_io.bfbs"]

[send]
root_type = "cubs2.sil.ExternalOdometrySample"

[send.route]
timestamp_us = "odometry_timestamp_us"
x_m = "odometry_x_m"
y_m = "odometry_y_m"
z_m = "odometry_z_m"
qw = "odometry_qw"
qx = "odometry_qx"
qy = "odometry_qy"
qz = "odometry_qz"
vx_m_s = "odometry_vx_m_s"
vy_m_s = "odometry_vy_m_s"
vz_m_s = "odometry_vz_m_s"
roll_rate_rad_s = "odometry_roll_rate_rad_s"
pitch_rate_rad_s = "odometry_pitch_rate_rad_s"
yaw_rate_rad_s = "odometry_yaw_rate_rad_s"
tracking_valid = "odometry_tracking_valid"

[receive]
root_type = "cubs2.sil.PwmOutputs"

[receive.route]
output0_us = "model:pwm0_us"
output1_us = "model:pwm1_us"
output2_us = "model:pwm2_us"
output3_us = "model:pwm3_us"
output4_us = "model:pwm4_us"
output5_us = "model:pwm5_us"
output6_us = "model:pwm6_us"
output7_us = "model:pwm7_us"
output8_us = "model:pwm8_us"

[signals.send]
odometry_timestamp_us = "model:odometry_timestamp_us"
odometry_x_m = "model:odometry_x_m"
odometry_y_m = "model:odometry_y_m"
odometry_z_m = "model:odometry_z_m"
odometry_qw = "model:odometry_qw"
odometry_qx = "model:odometry_qx"
odometry_qy = "model:odometry_qy"
odometry_qz = "model:odometry_qz"
odometry_vx_m_s = "model:odometry_vx_m_s"
odometry_vy_m_s = "model:odometry_vy_m_s"
odometry_vz_m_s = "model:odometry_vz_m_s"
odometry_roll_rate_rad_s = "model:odometry_roll_rate_rad_s"
odometry_pitch_rate_rad_s = "model:odometry_pitch_rate_rad_s"
odometry_yaw_rate_rad_s = "model:odometry_yaw_rate_rad_s"
odometry_tracking_valid = "model:odometry_tracking_valid"

[debug_log]
ring_size = 8192
trigger_signal = "unused"
path = "artifacts/native-sim-sil/native-sim-plant.csv"
capture = [
  "model:time",
  "model:x_m",
  "model:y_m",
  "model:z_m",
  "model:vx_m_s",
  "model:vy_m_s",
  "model:vz_m_s",
  "model:airspeed_m_s",
  "model:roll_rad",
  "model:pitch_rad",
  "model:yaw_rad",
  "model:aileron_cmd",
  "model:elevator_cmd",
  "model:throttle_cmd",
  "model:rudder_cmd",
  "model:stick_roll_cmd",
  "model:stick_pitch_cmd",
  "model:stick_throttle_cmd",
  "model:stick_yaw_cmd",
  "model:armed_cmd",
  "model:current_waypoint",
  "model:desired_speed_m_s",
  "model:roll_command_rad",
  "model:course_error_rad",
]
