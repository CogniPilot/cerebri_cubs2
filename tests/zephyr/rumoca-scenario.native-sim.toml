source_roots = [
  "../../../models/modelica_models",
]

[rumoca]
version = "1"
task = "simulate"

[model]
file = "Vehicles/Cubs2/AvionicsPlant.mo"
name = "Vehicles.Cubs2.AvionicsPlant"

[sim]
dt = 0.02
mode = "lockstep"
solver = "rk-like"
t_end = 40.0
output = "artifacts/native-sim-sil/native-sim-rumoca.html"

[lockstep]
send_rate_hz = 50.0
receive_rate_hz = 50.0
max_advance_dt = 0.02

[input]
mode = "auto"

[transport.zenoh]
mode = "client"
endpoint = "udp/127.0.0.1:7448"

[publish]
send = "cubs2/sil/external_odometry"

[subscribe]
receive = "cubs2/sil/pwm_signal_outputs"

[schema]
bfbs = ["build-native_sim/_deps/synapse_fbs_c-src/bfbs/all.bfbs"]

[send]
root_type = "synapse.topic.ExternalOdometry"

[send.route]
"data.timestamp_us" = "odometry_timestamp_us"
"data.position_enu_m.x" = "odometry_x_m"
"data.position_enu_m.y" = "odometry_y_m"
"data.position_enu_m.z" = "odometry_z_m"
"data.attitude.w" = "odometry_qw"
"data.attitude.x" = "odometry_qx"
"data.attitude.y" = "odometry_qy"
"data.attitude.z" = "odometry_qz"
"data.linear_velocity_enu_m_s.x" = "odometry_vx_m_s"
"data.linear_velocity_enu_m_s.y" = "odometry_vy_m_s"
"data.linear_velocity_enu_m_s.z" = "odometry_vz_m_s"
"data.angular_velocity_flu_rad_s.roll" = "odometry_roll_rate_rad_s"
"data.angular_velocity_flu_rad_s.pitch" = "odometry_pitch_rate_rad_s"
"data.angular_velocity_flu_rad_s.yaw" = "odometry_yaw_rate_rad_s"
"data.flags" = "odometry_flags"
"data.status" = "odometry_status"
"data.source_id" = "odometry_source_id"
"data.id" = "odometry_id"

[receive]
root_type = "synapse.topic.PwmSignalOutputs"

[receive.route]
"data.output0_us" = "model:pwm0_us"
"data.output1_us" = "model:pwm1_us"
"data.output2_us" = "model:pwm2_us"
"data.output3_us" = "model:pwm3_us"
"data.output4_us" = "model:pwm4_us"
"data.output5_us" = "model:pwm5_us"
"data.output6_us" = "model:pwm6_us"
"data.output7_us" = "model:pwm7_us"
"data.output8_us" = "model:pwm8_us"

[signals.send]
odometry_timestamp_us = "model:odometry_timestamp_us"
odometry_x_m = "model:odometry_x_m"
odometry_y_m = "model:odometry_y_m"
odometry_z_m = "model:odometry_z_m"
odometry_qw = "model:odometry_qw"
odometry_qx = "model:odometry_qx"
odometry_qy = "model:odometry_qy"
odometry_qz = "model:odometry_qz"
odometry_vx_m_s = "model:odometry_vx_m_s"
odometry_vy_m_s = "model:odometry_vy_m_s"
odometry_vz_m_s = "model:odometry_vz_m_s"
odometry_roll_rate_rad_s = "model:odometry_roll_rate_rad_s"
odometry_pitch_rate_rad_s = "model:odometry_pitch_rate_rad_s"
odometry_yaw_rate_rad_s = "model:odometry_yaw_rate_rad_s"
odometry_flags = "model:odometry_flags"
odometry_status = "model:odometry_status"
odometry_source_id = "model:odometry_source_id"
odometry_id = "model:odometry_id"

[debug_log]
ring_size = 8192
trigger_signal = "unused"
path = "artifacts/native-sim-sil/native-sim-plant.csv"
capture = [
  "model:time",
  "model:x_m",
  "model:y_m",
  "model:z_m",
  "model:vx_m_s",
  "model:vy_m_s",
  "model:vz_m_s",
  "model:airspeed_m_s",
  "model:roll_rad",
  "model:pitch_rad",
  "model:yaw_rad",
  "model:aileron_cmd",
  "model:elevator_cmd",
  "model:throttle_cmd",
  "model:rudder_cmd",
  "model:stick_roll_cmd",
  "model:stick_pitch_cmd",
  "model:stick_throttle_cmd",
  "model:stick_yaw_cmd",
  "model:armed_cmd",
  "model:current_waypoint",
  "model:desired_speed_m_s",
  "model:roll_command_rad",
  "model:course_error_rad",
]
