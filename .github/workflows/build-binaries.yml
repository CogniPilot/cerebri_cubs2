name: Build Binaries

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "*"
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  modelica:
    name: Rumoca fmt/lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: cerebri_cubs2
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Check Modelica
        working-directory: cerebri_cubs2
        run: nix run .#rumoca-check

  build:
    name: Build ${{ matrix.target.name }}
    needs:
      - modelica
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: mr_vmu_tropic
            command: nix run .#build
            files: |
              build-mr_vmu_tropic/zephyr/zephyr.elf
              build-mr_vmu_tropic/zephyr/zephyr.bin
              build-mr_vmu_tropic/zephyr/zephyr.map
          - name: native_sim
            command: nix run .#build-native-sim
            files: |
              build-native_sim/zephyr/zephyr.exe
              build-native_sim/zephyr/zephyr.elf
              build-native_sim/zephyr/zephyr.map

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: cerebri_cubs2
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Update west workspace
        working-directory: cerebri_cubs2
        run: nix run .#west-update

      - name: Build
        working-directory: cerebri_cubs2
        run: ${{ matrix.target.command }}

      - name: Stage binaries
        working-directory: cerebri_cubs2
        env:
          TARGET_FILES: ${{ matrix.target.files }}
          TARGET_NAME: ${{ matrix.target.name }}
        run: |
          mkdir -p "dist/$TARGET_NAME"

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            cp "$file" "dist/$TARGET_NAME/$TARGET_NAME-$(basename "$file")"
          done <<< "$TARGET_FILES"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: cerebri-cubs2-${{ matrix.target.name }}
          path: cerebri_cubs2/dist/${{ matrix.target.name }}/*
          if-no-files-found: error

  flight-sil:
    name: Flight SIL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: cerebri_cubs2
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Run staged flight SIL
        working-directory: cerebri_cubs2
        run: nix run .#flight-sil-test

      - name: Upload flight artifacts
        id: upload-flight-artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cerebri-cubs2-flight-sil
          path: |
            cerebri_cubs2/artifacts/flight/*.csv
            cerebri_cubs2/artifacts/flight/*.png
            cerebri_cubs2/artifacts/flight/*.html
            cerebri_cubs2/artifacts/flight/*.md
          if-no-files-found: error

      - name: Publish flight summary
        if: always()
        working-directory: cerebri_cubs2
        env:
          FLIGHT_ARTIFACT_URL: ${{ steps.upload-flight-artifacts.outputs.artifact-url }}
        run: |
          if [ -f artifacts/flight/flight-summary.md ]; then
            cat artifacts/flight/flight-summary.md >> "$GITHUB_STEP_SUMMARY"
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "$FLIGHT_ARTIFACT_URL" ]; then
            printf '[Download flight artifacts](%s)\n' "$FLIGHT_ARTIFACT_URL" >> "$GITHUB_STEP_SUMMARY"
          fi

  release:
    name: Publish release binaries
    if: ${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          tag="$GITHUB_REF_NAME"
          if [ "$EVENT_NAME" = "release" ]; then
            tag="$RELEASE_TAG"
          fi

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes
          fi

          gh release upload "$tag" dist/* --clobber
