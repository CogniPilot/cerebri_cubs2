name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "*"
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

env:
  NIX_FLAGS: --quiet --option warn-dirty false
  CUBS2_QUIET_LOGS: "1"
  CUBS2_LOG_TAIL_LINES: "200"

jobs:
  modelica:
    name: Rumoca fmt/lint
    runs-on: ubuntu-latest
    concurrency:
      group: nix-cache-${{ github.workflow }}-${{ github.run_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: cerebri_cubs2
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          trust-runner-user: true
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            keep-outputs = true
            keep-derivations = true

      - name: Cache Nix builds
        uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-gha-cache: enabled
          use-flakehub: disabled
          diagnostic-endpoint: ""

      - name: Check Modelica
        working-directory: cerebri_cubs2
        run: nix $NIX_FLAGS run .#rumoca-check

  build:
    name: Build ${{ matrix.target.name }}
    needs:
      - modelica
    runs-on: ubuntu-latest
    concurrency:
      group: nix-cache-${{ github.workflow }}-${{ github.run_id }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        target:
          - name: mr_vmu_tropic
            command: nix $NIX_FLAGS run .#build
            log: build-mr_vmu_tropic/west-build.log
            files: |
              build-mr_vmu_tropic/zephyr/zephyr.elf
              build-mr_vmu_tropic/zephyr/zephyr.bin
              build-mr_vmu_tropic/zephyr/zephyr.map
          - name: native_sim
            command: nix $NIX_FLAGS run .#build-native-sim
            log: build-native_sim/west-build.log
            files: |
              build-native_sim/zephyr/zephyr.exe
              build-native_sim/zephyr/zephyr.elf
              build-native_sim/zephyr/zephyr.map

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: cerebri_cubs2
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          trust-runner-user: true
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            keep-outputs = true
            keep-derivations = true

      - name: Cache Nix builds
        uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-gha-cache: enabled
          use-flakehub: disabled
          diagnostic-endpoint: ""

      - name: Update west workspace
        working-directory: cerebri_cubs2
        run: nix $NIX_FLAGS run .#west-update

      - name: Build
        working-directory: cerebri_cubs2
        run: ${{ matrix.target.command }}

      - name: Stage binaries
        working-directory: cerebri_cubs2
        env:
          TARGET_FILES: ${{ matrix.target.files }}
          TARGET_NAME: ${{ matrix.target.name }}
        run: |
          mkdir -p "dist/$TARGET_NAME"

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            cp "$file" "dist/$TARGET_NAME/$TARGET_NAME-$(basename "$file")"
          done <<< "$TARGET_FILES"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: cerebri-cubs2-${{ matrix.target.name }}
          path: cerebri_cubs2/dist/${{ matrix.target.name }}/*
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cerebri-cubs2-${{ matrix.target.name }}-build-log
          path: cerebri_cubs2/${{ matrix.target.log }}
          if-no-files-found: warn

  modelica_flight_test:
    name: Modelica Flight Test
    needs:
      - build
    runs-on: ubuntu-latest
    concurrency:
      group: nix-cache-${{ github.workflow }}-${{ github.run_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: cerebri_cubs2
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          trust-runner-user: true
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            keep-outputs = true
            keep-derivations = true

      - name: Cache Nix builds
        uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-gha-cache: enabled
          use-flakehub: disabled
          diagnostic-endpoint: ""

      - name: Run Modelica flight test
        working-directory: cerebri_cubs2
        run: nix $NIX_FLAGS run .#flight-sil-test

      - name: Upload Modelica flight test artifacts
        id: upload-flight-artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cerebri-cubs2-flight-sil
          path: |
            cerebri_cubs2/artifacts/flight/*.csv
            cerebri_cubs2/artifacts/flight/*.png
            cerebri_cubs2/artifacts/flight/*.html
            cerebri_cubs2/artifacts/flight/*.md
          if-no-files-found: error

      - name: Publish Modelica flight test summary
        if: always()
        working-directory: cerebri_cubs2
        env:
          FLIGHT_ARTIFACT_URL: ${{ steps.upload-flight-artifacts.outputs.artifact-url }}
        run: |
          if [ -f artifacts/flight/flight-summary.md ]; then
            cat artifacts/flight/flight-summary.md >> "$GITHUB_STEP_SUMMARY"
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "$FLIGHT_ARTIFACT_URL" ]; then
            printf '[Download flight artifacts](%s)\n' "$FLIGHT_ARTIFACT_URL" >> "$GITHUB_STEP_SUMMARY"
          fi

  zephyr_sil_flight_test:
    name: Zephyr SIL Flight Test
    needs:
      - modelica_flight_test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: nix-cache-${{ github.workflow }}-${{ github.run_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: cerebri_cubs2
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          trust-runner-user: true
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            keep-outputs = true
            keep-derivations = true

      - name: Cache Nix builds
        uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-gha-cache: enabled
          use-flakehub: disabled
          diagnostic-endpoint: ""

      - name: Download native_sim executable
        uses: actions/download-artifact@v4
        with:
          name: cerebri-cubs2-native_sim
          path: cerebri_cubs2/dist/native_sim

      - name: Run Zephyr SIL flight test
        working-directory: cerebri_cubs2
        run: |
          chmod +x dist/native_sim/native_sim-zephyr.exe
          nix $NIX_FLAGS run .#native-sim-sil-run -- \
            --sim dist/native_sim/native_sim-zephyr.exe

      - name: Upload Zephyr SIL flight test artifacts
        id: upload-native-sim-artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cerebri-cubs2-native-sim-zenoh-sil
          path: |
            cerebri_cubs2/artifacts/native-sim-sil/*.csv
            cerebri_cubs2/artifacts/native-sim-sil/*.log
            cerebri_cubs2/artifacts/native-sim-sil/*.md
          if-no-files-found: warn

      - name: Publish Zephyr SIL flight test summary
        if: always()
        working-directory: cerebri_cubs2
        env:
          NATIVE_SIM_ARTIFACT_URL: ${{ steps.upload-native-sim-artifacts.outputs.artifact-url }}
        run: |
          if [ -f artifacts/native-sim-sil/native-sim-summary.md ]; then
            cat artifacts/native-sim-sil/native-sim-summary.md >> "$GITHUB_STEP_SUMMARY"
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "$NATIVE_SIM_ARTIFACT_URL" ]; then
            printf '[Download native_sim SIL artifacts](%s)\n' "$NATIVE_SIM_ARTIFACT_URL" >> "$GITHUB_STEP_SUMMARY"
          fi

  release:
    name: Publish release binaries
    if: ${{ (github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')) && needs.build.result == 'success' && needs.modelica_flight_test.result == 'success' && needs.zephyr_sil_flight_test.result == 'success' }}
    needs:
      - build
      - modelica_flight_test
      - zephyr_sil_flight_test
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download mr_vmu_tropic binaries
        uses: actions/download-artifact@v4
        with:
          name: cerebri-cubs2-mr_vmu_tropic
          path: dist

      - name: Download native_sim binaries
        uses: actions/download-artifact@v4
        with:
          name: cerebri-cubs2-native_sim
          path: dist

      - name: Create or update GitHub release
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          tag="$GITHUB_REF_NAME"
          if [ "$EVENT_NAME" = "release" ]; then
            tag="$RELEASE_TAG"
          fi

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes
          fi

          gh release upload "$tag" dist/* --clobber
