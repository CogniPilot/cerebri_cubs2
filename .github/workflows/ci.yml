name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  release:
    types:
      - published

concurrency:
  group: ci-v2-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' && !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  NIX_FLAGS: >-
    --quiet
    --option warn-dirty false
    --option http-connections 1
    --option max-substitution-jobs 1
  CUBS2_QUIET_LOGS: "1"
  CUBS2_LOG_TAIL_LINES: "200"

jobs:
  release_tag:
    name: Release tag gate
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
      tag: ${{ steps.check.outputs.tag }}

    steps:
      - name: Check release tag
        id: check
        run: |
          tag=""

          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            tag="$(jq -r '.release.tag_name // ""' "$GITHUB_EVENT_PATH")"
          elif [ "$GITHUB_REF_TYPE" = "tag" ]; then
            tag="$GITHUB_REF_NAME"
          fi

          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            enabled=true
          else
            enabled=false
          fi

          {
            printf 'enabled=%s\n' "$enabled"
            printf 'tag=%s\n' "$tag"
          } >> "$GITHUB_OUTPUT"

  modelica:
    name: Nix Setup + Rumoca fmt/lint
    runs-on: ubuntu-latest
    concurrency:
      group: nix-cache-v2-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          path: cerebri_cubs2
          persist-credentials: false

      - name: Set up Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Prefer GitHub Nix cache
        run: |
          # magic-nix-cache-action v14 probes this netrc path before attempting
          # FlakeHub auth. The FlakeHub cache is disabled below, so an empty
          # file avoids an unnecessary FlakeHub ID-token request.
          install -m 0600 /dev/null "$RUNNER_TEMP/determinate-nix-installer-netrc"

      - name: Cache Nix builds
        uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-flakehub: disabled
          use-gha-cache: enabled

      - name: Run Rumoca fmt/lint
        working-directory: cerebri_cubs2
        run: nix $NIX_FLAGS run .#rumoca-check

  build:
    name: Build ${{ matrix.target.name }}
    needs:
      - modelica
      - release_tag
    runs-on: ubuntu-latest
    concurrency:
      group: nix-cache-v2-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        target:
          - name: mr_vmu_tropic
            command: nix $NIX_FLAGS run .#build
            log: build-mr_vmu_tropic/west-build.log
            files: |
              build-mr_vmu_tropic/zephyr/zephyr.elf
              build-mr_vmu_tropic/zephyr/zephyr.bin
              build-mr_vmu_tropic/zephyr/zephyr.map

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          path: cerebri_cubs2
          persist-credentials: false

      - name: Set up Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Prefer GitHub Nix cache
        run: |
          # magic-nix-cache-action v14 probes this netrc path before attempting
          # FlakeHub auth. The FlakeHub cache is disabled below, so an empty
          # file avoids an unnecessary FlakeHub ID-token request.
          install -m 0600 /dev/null "$RUNNER_TEMP/determinate-nix-installer-netrc"

      - name: Cache Nix builds
        uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-flakehub: disabled
          use-gha-cache: enabled

      - name: Update west workspace
        working-directory: cerebri_cubs2
        run: nix $NIX_FLAGS run .#west-update

      - name: Build
        working-directory: cerebri_cubs2
        run: ${{ matrix.target.command }}

      - name: Stage binaries
        if: ${{ needs.release_tag.outputs.enabled == 'true' }}
        working-directory: cerebri_cubs2
        env:
          TARGET_FILES: ${{ matrix.target.files }}
          TARGET_NAME: ${{ matrix.target.name }}
        run: |
          mkdir -p "dist/$TARGET_NAME"

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            cp "$file" "dist/$TARGET_NAME/$TARGET_NAME-$(basename "$file")"
          done <<< "$TARGET_FILES"

      - name: Upload binaries
        if: ${{ needs.release_tag.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cerebri-cubs2-${{ matrix.target.name }}
          path: cerebri_cubs2/dist/${{ matrix.target.name }}/*
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cerebri-cubs2-${{ matrix.target.name }}-build-log
          path: cerebri_cubs2/${{ matrix.target.log }}
          if-no-files-found: warn

  modelica_flight_test:
    name: Modelica Flight Test
    needs:
      - build
    runs-on: ubuntu-latest
    concurrency:
      group: nix-cache-v2-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          path: cerebri_cubs2
          persist-credentials: false

      - name: Set up Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Prefer GitHub Nix cache
        run: |
          # magic-nix-cache-action v14 probes this netrc path before attempting
          # FlakeHub auth. The FlakeHub cache is disabled below, so an empty
          # file avoids an unnecessary FlakeHub ID-token request.
          install -m 0600 /dev/null "$RUNNER_TEMP/determinate-nix-installer-netrc"

      - name: Cache Nix builds
        uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-flakehub: disabled
          use-gha-cache: enabled

      - name: Run Modelica flight test
        working-directory: cerebri_cubs2
        run: nix $NIX_FLAGS run .#flight-sil-test

      - name: Upload Modelica flight test artifacts
        id: upload-flight-artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cerebri-cubs2-flight-sil
          path: |
            cerebri_cubs2/artifacts/flight/*.csv
            cerebri_cubs2/artifacts/flight/*.png
            cerebri_cubs2/artifacts/flight/*.html
            cerebri_cubs2/artifacts/flight/*.md
          if-no-files-found: error

      - name: Publish Modelica flight test summary
        if: always()
        working-directory: cerebri_cubs2
        env:
          FLIGHT_ARTIFACT_URL: ${{ steps.upload-flight-artifacts.outputs.artifact-url }}
        run: |
          if [ -f artifacts/flight/flight-summary.md ]; then
            cat artifacts/flight/flight-summary.md >> "$GITHUB_STEP_SUMMARY"
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "$FLIGHT_ARTIFACT_URL" ]; then
            printf '[Download flight artifacts](%s)\n' "$FLIGHT_ARTIFACT_URL" >> "$GITHUB_STEP_SUMMARY"
          fi

  zephyr_sil_flight_test:
    name: Zephyr SIL Flight Test
    needs:
      - modelica_flight_test
      - release_tag
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: nix-cache-v2-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          path: cerebri_cubs2
          persist-credentials: false

      - name: Set up Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Prefer GitHub Nix cache
        run: |
          # magic-nix-cache-action v14 probes this netrc path before attempting
          # FlakeHub auth. The FlakeHub cache is disabled below, so an empty
          # file avoids an unnecessary FlakeHub ID-token request.
          install -m 0600 /dev/null "$RUNNER_TEMP/determinate-nix-installer-netrc"

      - name: Cache Nix builds
        uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-flakehub: disabled
          use-gha-cache: enabled

      - name: Update west workspace
        working-directory: cerebri_cubs2
        run: nix $NIX_FLAGS run .#west-update

      - name: Build native_sim executable
        working-directory: cerebri_cubs2
        run: nix $NIX_FLAGS run .#build-native-sim

      - name: Run Zephyr SIL flight test
        working-directory: cerebri_cubs2
        run: |
          chmod +x build-native_sim/zephyr/zephyr.exe
          nix $NIX_FLAGS run .#native-sim-sil-run -- \
            --sim build-native_sim/zephyr/zephyr.exe \
            --allow-missing-rumoca-scenario-runner

      - name: Build native_sim/native/64 executable
        if: ${{ needs.release_tag.outputs.enabled == 'true' }}
        working-directory: cerebri_cubs2
        run: nix $NIX_FLAGS run .#build-native-sim-64

      - name: Stage native_sim binaries
        if: ${{ needs.release_tag.outputs.enabled == 'true' }}
        working-directory: cerebri_cubs2
        run: |
          mkdir -p dist/native_sim
          cp build-native_sim/zephyr/zephyr.exe dist/native_sim/native_sim-zephyr.exe
          cp build-native_sim/zephyr/zephyr.elf dist/native_sim/native_sim-zephyr.elf
          cp build-native_sim/zephyr/zephyr.map dist/native_sim/native_sim-zephyr.map

      - name: Upload native_sim binaries
        if: ${{ needs.release_tag.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cerebri-cubs2-native_sim
          path: cerebri_cubs2/dist/native_sim/*
          if-no-files-found: error

      - name: Stage native_sim/native/64 binaries
        if: ${{ needs.release_tag.outputs.enabled == 'true' }}
        working-directory: cerebri_cubs2
        run: |
          mkdir -p dist/native_sim_64
          cp build-native_sim_native_64/zephyr/zephyr.exe dist/native_sim_64/native_sim_64-zephyr.exe
          cp build-native_sim_native_64/zephyr/zephyr.elf dist/native_sim_64/native_sim_64-zephyr.elf
          cp build-native_sim_native_64/zephyr/zephyr.map dist/native_sim_64/native_sim_64-zephyr.map

      - name: Upload native_sim/native/64 binaries
        if: ${{ needs.release_tag.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cerebri-cubs2-native_sim_64
          path: cerebri_cubs2/dist/native_sim_64/*
          if-no-files-found: error

      - name: Upload Zephyr SIL flight test artifacts
        id: upload-native-sim-artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cerebri-cubs2-native-sim-zenoh-sil
          path: |
            cerebri_cubs2/artifacts/native-sim-sil/*.csv
            cerebri_cubs2/artifacts/native-sim-sil/*.log
            cerebri_cubs2/artifacts/native-sim-sil/*.md
            cerebri_cubs2/artifacts/native-sim-sil/*.png
            cerebri_cubs2/artifacts/native-sim-sil/*.html
            cerebri_cubs2/artifacts/native-sim-sil/*.bfbs
          if-no-files-found: warn

      - name: Publish Zephyr SIL flight test summary
        if: always()
        working-directory: cerebri_cubs2
        env:
          NATIVE_SIM_ARTIFACT_URL: ${{ steps.upload-native-sim-artifacts.outputs.artifact-url }}
        run: |
          if [ -f artifacts/native-sim-sil/native-sim-summary.md ]; then
            cat artifacts/native-sim-sil/native-sim-summary.md >> "$GITHUB_STEP_SUMMARY"
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "$NATIVE_SIM_ARTIFACT_URL" ]; then
            printf '[Download native_sim SIL artifacts](%s)\n' "$NATIVE_SIM_ARTIFACT_URL" >> "$GITHUB_STEP_SUMMARY"
          fi

  release:
    name: Publish release binaries
    if: ${{ needs.release_tag.outputs.enabled == 'true' && needs.build.result == 'success' && needs.modelica_flight_test.result == 'success' && needs.zephyr_sil_flight_test.result == 'success' }}
    needs:
      - release_tag
      - build
      - modelica_flight_test
      - zephyr_sil_flight_test
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download mr_vmu_tropic binaries
        uses: actions/download-artifact@v8.0.1
        with:
          name: cerebri-cubs2-mr_vmu_tropic
          path: dist

      - name: Download native_sim binaries
        uses: actions/download-artifact@v8.0.1
        with:
          name: cerebri-cubs2-native_sim
          path: dist

      - name: Download native_sim/native/64 binaries
        uses: actions/download-artifact@v8.0.1
        with:
          name: cerebri-cubs2-native_sim_64
          path: dist

      - name: Create or update GitHub release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release_tag.outputs.tag }}
        run: |
          tag="$RELEASE_TAG"

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes
          fi

          mapfile -t files < <(find dist -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            printf 'error: no release binaries found under dist\n' >&2
            exit 1
          fi

          gh release upload "$tag" "${files[@]}" --clobber
