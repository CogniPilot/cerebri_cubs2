CONFIG_CODE_DATA_RELOCATION=y
CONFIG_POSIX_API=y
CONFIG_MAX_PTHREAD_MUTEX_COUNT=16
CONFIG_MAX_PTHREAD_COND_COUNT=8

CONFIG_MDIO=y
CONFIG_MDIO_SHELL=y
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_UDP=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_INIT_TIMEOUT=0
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.2"
CONFIG_NET_SHELL=y
CONFIG_NET_STATISTICS=y
CONFIG_NET_STATISTICS_PER_INTERFACE=y
CONFIG_NET_STATISTICS_USER_API=y
CONFIG_NET_STATISTICS_IPV4=y
CONFIG_NET_STATISTICS_ICMP=y
CONFIG_NET_STATISTICS_UDP=y
CONFIG_NET_STATISTICS_ETHERNET=y

CONFIG_CSYN_ZENOH=y
CONFIG_CSYN_ZENOH_MODE="client"
CONFIG_CSYN_ZENOH_LOCATOR="udp/192.0.2.2:7447"
# Mocap source: raw rigid-body measurements decoded from the bridge's
# mocap_frame stream (synapse_qualisys_bridge >= 0.3.0).
CONFIG_CSYN_MOCAP_SOURCE_FRAME=y
CONFIG_CSYN_MOCAP_RIGID_BODY_ID=1
# Alternative: bridge estimator output (extrapolates through dropouts).
# CONFIG_CSYN_MOCAP_SOURCE_EXTERNAL_ODOMETRY=y
# CONFIG_CSYN_ZENOH_EXTERNAL_ODOMETRY_KEY="synapse/v1/topic/external_odometry/1"
# Alternative: legacy compact pose key (electrode republisher).
# CONFIG_CSYN_MOCAP_SOURCE_POSE_KEY=y
CONFIG_CSYN_ZENOH_MOCAP_POSE_KEY="synapse/mocap/rigid_body/cub1/pose"
