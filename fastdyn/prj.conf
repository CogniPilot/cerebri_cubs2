# Complete application profile for the rehosted firmware. Build with
# CONF_FILE=fastdyn/prj.conf so hardware-only console and network fragments are
# never selected and therefore do not need to be negated here.
CONFIG_MAIN_STACK_SIZE=6144
CONFIG_MAIN_THREAD_PRIORITY=2
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_THREAD_NAME=y
CONFIG_FPU=y
CONFIG_REQUIRES_FULL_LIBC=y
CONFIG_POLL=y
CONFIG_HEAP_MEM_POOL_SIZE=32768

CONFIG_ZROS=y
CONFIG_CSYN=y
CONFIG_CUBS2_AUTO_SWITCH_CHANNEL=4
CONFIG_CUBS2_FASTDYN=y

CONFIG_SPEED_OPTIMIZATIONS=y
CONFIG_SIZE_OPTIMIZATIONS=n

# FastDyn supplies the lockstep clock and deterministic entropy. The optional
# comms fragment adds the network stack when a networked rehost is wanted.
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_TIMER_RANDOM_GENERATOR=y
