CONFIG_CUBS2_FASTDYN=y
CONFIG_SPEED_OPTIMIZATIONS=y
CONFIG_SIZE_OPTIMIZATIONS=n

# Lockstep is direct shared memory. Keep the default performance profile free
# of network initialization; the optional comms overlay enables ENET/Zenoh.
CONFIG_CSYN_ZENOH=n
CONFIG_CSYN_ZROS_BRIDGE=n
CONFIG_NETWORKING=n
CONFIG_MDIO=n

# FastDyn provides CPU execution and ENET. Avoid physical-only analog power,
# PLL, and entropy initialization while keeping the real network stack.
CONFIG_ADJUST_DCDC=n
CONFIG_INIT_ARM_PLL=n
CONFIG_INIT_ENET_PLL=n
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_TIMER_RANDOM_GENERATOR=y

# The accelerated mission has no interactive console or hardware telemetry.
CONFIG_SHELL=n
CONFIG_ZROS_SHELL=n
CONFIG_CSYN_SHELL=n
CONFIG_ZENOH_PICO_SHELL=n
CONFIG_NET_SHELL=n
CONFIG_MDIO_SHELL=n
CONFIG_DEVICE_SHELL=n
CONFIG_KERNEL_SHELL=n
CONFIG_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_LOG=n
CONFIG_THREAD_MONITOR=n
CONFIG_THREAD_STACK_INFO=n
CONFIG_INIT_STACKS=n
CONFIG_THREAD_RUNTIME_STATS=n
CONFIG_NET_STATISTICS=n
